<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta id="themeColorMeta" name="theme-color" content="#0f1114" />
    <title>Rezeptwerk</title>

    <script>
      // Early theme bootstrap to avoid wrong startup background flash
      (function () {
        try {
          const raw = localStorage.getItem("tinkeroneo_theme_v1") || "system";
          const theme = String(raw || "system").toLowerCase();
          const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          const wantsDark = theme === "dark" || (theme === "system" && prefersDark);
          const resolved = wantsDark ? "dark" : "light";
          const bg = wantsDark ? "#0f1114" : "#f4efe6";

          document.documentElement.dataset.theme = resolved;
          document.documentElement.classList.toggle("dark", wantsDark);
          document.documentElement.style.backgroundColor = bg;

          const meta = document.getElementById("themeColorMeta");
          if (meta) meta.setAttribute("content", bg);
        } catch {
          // ignore
        }
      })();
    </script>

    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/base.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <link rel="stylesheet" href="styles/views.css" />
    <link id="app-favicon" rel="icon" href="./src/favicon/favicon.svg" type="image/svg+xml" />


    <link rel="apple-touch-icon" href="./icon-180.png" />
  </head>

  <body>
    <header class="app-header">
      <div class="header-grid">
        <div class="header-row header-row--top">
          <button id="backBtn" class="badge badge-btn" type="button" title="Zurück" hidden>←</button>
          <div class="header-space" id="headerSpaceWrap">
            <button id="headerSpaceToggle" class="badge badge-btn badge--space-toggle" type="button" title="Space wechseln" aria-expanded="false">🔀</button>
            <select id="headerSpaceSelect" class="badge badge-select badge--space" title="Space wählen"></select>
          </div>
          <button id="vegan101HeaderBtn" class="badge badge-btn" type="button" title="Vegan 101">🌱</button>

          <button id="modeBadge" class="badge badge-btn" type="button" title="Speicher-Modus">—</button>

          <div class="header-actions">
            <button id="radioHeaderBtn" class="badge badge-btn" type="button" title="Radio" hidden>🎧</button>
            <button id="shopBadge" class="badge badge-btn" type="button" title="Einkaufsliste">🧺</button>

            <!-- neu: nur noch 1 Einstieg -->
            <button id="accountBtn" class="badge badge-btn badge--warn" type="button" title="Account / Einstellungen" hidden>👤</button>
          </div>
        </div>
      </div>
    </header>

    <main id="app"></main>
    <div id="radioDockRoot"></div>

    <div id="globalTimersRoot" class="compact-mode"></div>

    <!-- Update Toast (single source of truth) -->
    <div id="updateToast" class="toast" role="status" aria-live="polite" aria-hidden="true">
      <div class="toast__text">
        <div class="toast__title">Update verfügbar</div>
        <div class="toast__msg">Neue Version ist bereit. Neu laden?</div>
      </div>
      <div class="toast__actions">
        <button id="toastLater" class="btn btn-ghost" type="button">Später</button>
        <button id="toastReload" class="btn btn-primary" type="button">Neu laden</button>
      </div>
    </div>

  <script type="module" src="./src/entry.js"></script>

    <script>
      // Service Worker: App-Shell Cache + Update-Toast (priorisiert, kein Reload während aktiver Timer)
      // DEV: disable SW to avoid stale CSS/JS (no hard refresh needed)
      const IS_DEV_HOST = location.hostname === "localhost" || location.hostname === "127.0.0.1";

      if (IS_DEV_HOST) {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations?.().then((regs) => regs.forEach((r) => r.unregister()));
        }
      } else if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          const toast = document.getElementById("updateToast");
          const btnLater = document.getElementById("toastLater");
          const btnReload = document.getElementById("toastReload");

          const hasActiveTimers = () => {
            try {
              // Timer-Store wird von domain/timers.js genutzt
              const raw = localStorage.getItem("tinkeroneo_timers_v1") || "[]";
              const timers = JSON.parse(raw);
              return (
                Array.isArray(timers) &&
                timers.some((t) => (t?.remainingSec ?? 0) > 0 || (t?.endAt ?? 0) > Date.now())
              );
            } catch {
              return false;
            }
          };

          const inCookView = () => {
            try {
              return (location.hash || "").startsWith("#cook");
            } catch {
              return false;
            }
          };

          const showToast = () => {
            if (!toast) return;
            // Priorisierung: kein Update-Toast während aktiver Timer oder im Kochmodus
            if (hasActiveTimers() || inCookView()) {
              // retry später
              window.clearTimeout(window.__updateToastRetry);
              window.__updateToastRetry = window.setTimeout(showToast, 1500);
              return;
            }
            toast.classList.add("toast--show");
            toast.setAttribute("aria-hidden", "false");
          };

          const hideToast = () => {
            if (!toast) return;
            toast.classList.remove("toast--show");
            toast.setAttribute("aria-hidden", "true");
          };

          try {
            const reg = await navigator.serviceWorker.register("./sw.js");
            const maybeShowUpdateToast = () => {
              if (reg?.waiting) showToast();
            };

            const requestSkipWaiting = () => {
              if (reg.waiting) {
                reg.waiting.postMessage({ type: "SKIP_WAITING" });
              }
            };

            maybeShowUpdateToast();

            // Buttons
            btnLater?.addEventListener("click", hideToast);
            btnReload?.addEventListener("click", () => {
              hideToast();
              requestSkipWaiting();
            });

            // Wenn ein Update gefunden & installiert wird: Toast anzeigen (statt sofort reload)
            reg.addEventListener("updatefound", () => {
              const sw = reg.installing;
              if (!sw) return;
              sw.addEventListener("statechange", () => {
                if (sw.state === "installed") {
                  maybeShowUpdateToast();
                }
              });
            });

            // Sobald der neue SW die Kontrolle übernimmt: reload
            let reloaded = false;
            navigator.serviceWorker.addEventListener("controllerchange", () => {
              if (reloaded) return;
              reloaded = true;
              window.location.reload();
            });

            // optional: gelegentlich nach Updates schauen
            setInterval(() => reg.update(), 60 * 60 * 1000);
          } catch {
            // offline/blocked => ok
          }
        });
      }
    </script>
  </body>
</html>
